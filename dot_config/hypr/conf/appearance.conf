general {
    gaps_in = 2
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(cdd6f4aa)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 2
    rounding_power = 2
    active_opacity = 0.95
    inactive_opacity = 0.80

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 2
        passes = 1
        new_optimizations = true
        ignore_opacity = false
    }
}
